<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SimpleMapper</title>
    <link rel="stylesheet" href="/marker-editor-app/styles.css" />
  </head>
  <body>
    <aside class="sidebar">
      <h1>SimpleMapper</h1>
      <p class="subtitle"> арта + инструменты</p>

      <div class="control-label"> арта</div>
      <div class="inline-note">main: <b>map</b></div>

      <div class="stats" id="map-stats"></div>
      <div class="stats" id="load-stats">ќжидание загрузки...</div>

      <h2>»нструменты</h2>
      <label class="control-label" for="image-input"> артинка</label>
      <input id="image-input" type="file" accept="image/*" />
      <div class="inline-note" id="source-image-size">»сточник: не загружен</div>

      <label class="control-label">÷елевое разрешение</label>
      <div class="res-row">
        <input id="target-width" type="number" max="4096" step="1" value="256" />
        <button id="aspect-lock-btn" type="button" class="aspect-lock-btn" title="—в€зь сторон">??</button>
        <input id="target-height" type="number" max="4096" step="1" value="256" />
      </div>
      <div class="inline-note" id="target-resolution-note">256 x 256</div>

      <label class="control-label" for="gen-icon">»конка</label>
      <select id="gen-icon">
        <option value="0">custom</option>
        <option value="1">chest</option>
        <option value="2">cross</option>
        <option value="3">flag</option>
        <option value="4">flash</option>
        <option value="5">magnifier</option>
        <option value="6">question</option>
      </select>
      <label class="toggle">
        <input id="auto-icons" type="checkbox" checked />
        <span>јвто-иконки</span>
      </label>
      <label class="toggle">
        <input id="high-perf-mode" type="checkbox" />
        <span>High-perf mode (кружки)</span>
      </label>

      <label class="control-label" for="sticker-scale">ћасштаб (в тайлах)</label>
      <input id="sticker-scale" type="number" min="0.2" max="200" step="0.2" value="1" />

      <div class="button-row">
        <button id="generate-btn" type="button">—генерировать</button>
        <button id="clear-generated-btn" type="button">ќчистить</button>
      </div>
      <div class="button-row">
        <button id="delete-selected-btn" type="button">”далить ¬ыделенные</button>
      </div>
      <div class="button-row">
        <button id="bake-image-btn" type="button">«апечь  артинку</button>
        <button id="bake-cfg-btn" type="button">«апечь CFG</button>
      </div>
      <div class="inline-note" id="gen-stats">Ќет сгенерированных меток</div>

      <h2>CFG</h2>
      <input id="cfg-file-input" type="file" accept=".cfg,.json,application/json,text/plain" style="display:none" />
      <div class="button-row">
        <button id="cfg-pick-btn" type="button">¬ыбрать CFG</button>
      </div>
      <div class="inline-note" id="cfg-status">CFG: не выбран</div>

      <div class="footer-note">
        ѕанорама: ѕ ћ. Ћ ћ: выделение/таск меток. «ум: колесо мыши.
      </div>
      <div class="footer-note">
        <a href="/marker-editor" style="color: #9dd6ff">Debug: удаление тайлов</a>
      </div>
    </aside>

    <main class="viewer-wrap">
      <canvas id="viewer"></canvas>
      <aside class="perf-panel" id="perf-panel">
        <div class="perf-title">Perf</div>
        <div class="perf-content" id="perf-stats">ќжидание...</div>
      </aside>
    </main>

    <script src="/marker-editor-app/app.js" defer></script>
  </body>
</html>
